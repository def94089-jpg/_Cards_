<script>

const customer = JSON.parse(localStorage.getItem("customerDetails"));

if(customer){

document.getElementById("customerName").textContent = customer.name;

document.getElementById("productName").textContent = customer.order.name;

document.getElementById("productQuantity").textContent = customer.order.quantity;

document.getElementById("productTotal").textContent = customer.order.total;

}
