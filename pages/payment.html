<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | Cards</title>

<link rel="stylesheet" href="../assets/css/style.css">

</head>

<body>

<header class="navbar">

<div class="container">

<div class="logo">

<a href="../index.html">

<img src="../assets/images/logo/logo.jpg" alt="Cards Logo">

</a>

<h2>Cards</h2>

</div>

</div>

</header>

<section class="product-page">

<div class="container">

<div class="product-details">

<h1>Complete Your Order</h1>

<hr><br>

<h3>Order Summary</h3>

<p><b>Product:</b> <span id="productName">Loading...</span></p>

<p><b>Price:</b> ₹<span id="productPrice">0</span></p>

<p><b>Quantity:</b> <span id="productQuantity">0</span></p>

<p><b>Total:</b> ₹<span id="productTotal">0</span></p>

<br>

<h3>Your Details</h3>

<input
type="text"
id="customerName"
placeholder="Enter Your Name"
required>

<br><br>

<input
type="tel"
id="customerPhone"
placeholder="Phone Number"
required>

<br><br>

<input
type="email"
id="customerEmail"
placeholder="Email (Optional)">

<br><br>

<h3>Scan & Pay</h3>

<img

src="../assets/images/misc/qr.jpg"

alt="QR Code"

style="width:250px;max-width:100%;border:2px solid #ccc;border-radius:10px;">

<br><br>

<button id="paidBtn">

I Have Paid

</button>

<br><br>

<a href="product.html">

<button class="backBtn">

Back

</button>

</a>

</div>

</div>

</section>

<script src="../assets/js/payment.js"></script>

</body>

</html>
