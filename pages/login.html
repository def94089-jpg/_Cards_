<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Cards Store | Login</title>

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/auth.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

<div class="container">

<a href="../index.html" class="logo">

<img src="../assets/images/logo/logo.jpg" alt="Premium Cards Logo">

<span>Premium Cards Store</span>

</a>

<nav class="navbar">

<a href="../index.html">Home</a>

<a href="products.html">Products</a>

<a href="about.html">About</a>

<a href="contact.html">Contact</a>

<a href="login.html" class="active">Login</a>

</nav>

</div>

</header>

<!-- ================= AUTH SECTION ================= -->

<section class="auth-section">

<div class="auth-container">

<div class="auth-card">

<h1>Premium Cards Store</h1>

<p class="subtitle">

Secure • Fast • Trusted

</p>

<div class="tab-buttons">

<button
id="loginTab"
class="tab active"
onclick="showLogin()">

Login

</button>

<button
id="signupTab"
class="tab"
onclick="showSignup()">

Create Account

</button>

</div>

<!-- ================= LOGIN FORM ================= -->

<div
id="loginForm"
class="form-section">

<div class="input-group">

<label>Email</label>

<input
type="email"
id="loginEmail"
placeholder="Enter your email">

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="loginPassword"
placeholder="Enter your password">

</div>

<div class="options">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="#">

Forgot Password?

</a>

</div>

<button
class="primary-btn"
type="button"
onclick="login()">

Login

</button>

<div class="divider">

<span>OR</span>

</div>

<button
class="google-btn"
type="button"
id="googleLogin">

Continue with Google

</button>

<p class="switch-text">

Don't have an account?

<a href="#"
onclick="showSignup()">

Create one

</a>

</p>

</div><!-- ================= SIGN UP FORM ================= -->

<div
id="signupForm"
class="form-section"
style="display:none;">

<div class="input-group">

<label>Full Name</label>

<input
type="text"
id="signupName"
placeholder="Enter your full name">

</div>

<div class="input-group">

<label>Email</label>

<input
type="email"
id="signupEmail"
placeholder="Enter your email">

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="signupPassword"
placeholder="Create a password">

</div>

<button
class="primary-btn"
type="button"
onclick="signUp()">

Create Account

</button>

<div class="divider">

<span>OR</span>

</div>

<button
class="google-btn"
type="button"
id="googleSignup">

Continue with Google

</button>

<p class="switch-text">

Already have an account?

<a href="#"
onclick="showLogin()">

Login

</a>

</p>

</div>

</div>

</div>

</section>

<script>

function showSignup(){

document.getElementById("loginForm").style.display="none";
document.getElementById("signupForm").style.display="block";

document.getElementById("loginTab").classList.remove("active");
document.getElementById("signupTab").classList.add("active");

}

function showLogin(){

document.getElementById("signupForm").style.display="none";
document.getElementById("loginForm").style.display="block";

document.getElementById("signupTab").classList.remove("active");
document.getElementById("loginTab").classList.add("active");

}

</script>

<script src="../assets/js/script.js"></script>

<script
type="module"
src="../assets/js/auth.js">
</script>

</body>

</html>
